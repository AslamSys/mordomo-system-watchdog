name: Deploy Watchdog

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/mordomo-system-watchdog
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-deploy
    runs-on: [self-hosted, mordomo]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy container
      run: |
        echo "Deploying mordomo-system-watchdog to Orange Pi..."

        # Stop existing container if running
        docker stop mordomo-system-watchdog || true
        docker rm mordomo-system-watchdog || true

        # Pull latest image
        docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mordomo-system-watchdog:latest

        # Run new container
        docker run -d \
          --name mordomo-system-watchdog \
          --restart unless-stopped \
          --privileged \
          --network host \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /sys:/sys:ro \
          -e NATS_URL=nats://localhost:4222 \
          ${{ secrets.DOCKERHUB_USERNAME }}/mordomo-system-watchdog:latest

        echo "Deployment completed successfully!"
